<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2200" viewBox="0 0 1800 2200">
  <rect width="1800" height="2200" fill="#ffffff"/>
  <text x="40" y="48" font-family="Arial, sans-serif" font-size="28" font-weight="700">DD Product Board Wireframes</text>
  <text x="40" y="78" font-family="Arial, sans-serif" font-size="14" fill="#444">Persona-driven backlog manager: desktop, mobile, and key states</text>

  <rect x="40" y="110" width="1720" height="480" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="56" y="142" font-family="Arial, sans-serif" font-size="18" font-weight="700">Desktop: Domain Board (Home)</text>
  <rect x="56" y="160" width="1688" height="44" fill="#e2e8f0" stroke="#cbd5e1"/>
  <text x="72" y="188" font-family="Arial, sans-serif" font-size="14">Top Nav: Search, Filters (Domain/Owner/Priority), New Initiative, Export CSV</text>
  <rect x="56" y="216" width="250" height="358" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="72" y="244" font-family="Arial, sans-serif" font-size="13">Sidebar</text>
  <text x="72" y="264" font-family="Arial, sans-serif" font-size="12">- Domain Board</text>
  <text x="72" y="282" font-family="Arial, sans-serif" font-size="12">- Priority Grid</text>
  <text x="72" y="300" font-family="Arial, sans-serif" font-size="12">- Owner Board</text>
  <text x="72" y="318" font-family="Arial, sans-serif" font-size="12">- Heatmap</text>
  <text x="72" y="336" font-family="Arial, sans-serif" font-size="12">- Buyer x User</text>
  <text x="72" y="354" font-family="Arial, sans-serif" font-size="12">- Gaps</text>
  <rect x="320" y="216" width="280" height="358" fill="#fef2f2" stroke="#fecaca"/>
  <text x="332" y="242" font-family="Arial, sans-serif" font-size="12">Klient</text>
  <rect x="332" y="252" width="256" height="92" fill="#fff" stroke="#cbd5e1"/>
  <text x="342" y="274" font-family="Arial, sans-serif" font-size="12">Webove rozhrani</text>
  <text x="342" y="292" font-family="Arial, sans-serif" font-size="11">Owner: Kuba | P1 | NEXT</text>
  <rect x="614" y="216" width="280" height="358" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="626" y="242" font-family="Arial, sans-serif" font-size="12">Trzby</text>
  <rect x="626" y="252" width="256" height="92" fill="#fff" stroke="#cbd5e1"/>
  <text x="636" y="274" font-family="Arial, sans-serif" font-size="12">Telco B2B</text>
  <text x="636" y="292" font-family="Arial, sans-serif" font-size="11">Owner: Adela | P1 | NEXT</text>
  <rect x="908" y="216" width="280" height="358" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="920" y="242" font-family="Arial, sans-serif" font-size="12">Nad Ramec</text>
  <rect x="1202" y="216" width="280" height="358" fill="#f0fdfa" stroke="#99f6e4"/>
  <text x="1214" y="242" font-family="Arial, sans-serif" font-size="12">B2B</text>
  <rect x="1496" y="216" width="248" height="358" fill="#fef2f2" stroke="#fecaca"/>
  <text x="1508" y="242" font-family="Arial, sans-serif" font-size="12">Compliance</text>

  <rect x="40" y="620" width="1720" height="330" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="56" y="650" font-family="Arial, sans-serif" font-size="18" font-weight="700">Desktop: Initiative Detail (Side Panel)</text>
  <rect x="56" y="668" width="1200" height="266" fill="#fff" stroke="#cbd5e1"/>
  <text x="72" y="694" font-family="Arial, sans-serif" font-size="13">Form fields: Title, Domain, Owner, Priority, Horizon, Status, Commercial Type, IsGap</text>
  <text x="72" y="714" font-family="Arial, sans-serif" font-size="13">Persona impacts sliders (Patient, Doctor, Employer, Insurer, B2B Admin, Regulator)</text>
  <text x="72" y="734" font-family="Arial, sans-serif" font-size="13">Revenue stream weights (B2B, B2G2C, B2C, Insurance)</text>
  <text x="72" y="754" font-family="Arial, sans-serif" font-size="13">Tabs: Features | Decisions | Risks | Dependencies</text>
  <rect x="1270" y="668" width="474" height="266" fill="#fff" stroke="#cbd5e1"/>
  <text x="1286" y="694" font-family="Arial, sans-serif" font-size="13">Persona Radar Chart</text>
  <text x="1286" y="714" font-family="Arial, sans-serif" font-size="12">Visual summary of impact per persona</text>

  <rect x="40" y="980" width="1720" height="420" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="56" y="1012" font-family="Arial, sans-serif" font-size="18" font-weight="700">Desktop: Analytics Views</text>
  <rect x="56" y="1034" width="840" height="350" fill="#fff" stroke="#cbd5e1"/>
  <text x="72" y="1060" font-family="Arial, sans-serif" font-size="13">Stakeholder Heatmap</text>
  <text x="72" y="1080" font-family="Arial, sans-serif" font-size="12">Rows = initiatives, Cols = personas, 1-5 color scale</text>
  <rect x="910" y="1034" width="834" height="350" fill="#fff" stroke="#cbd5e1"/>
  <text x="926" y="1060" font-family="Arial, sans-serif" font-size="13">Buyer x User Matrix</text>
  <text x="926" y="1080" font-family="Arial, sans-serif" font-size="12">X = buyer impact, Y = user impact, 4 quadrants</text>

  <rect x="40" y="1430" width="840" height="730" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="56" y="1460" font-family="Arial, sans-serif" font-size="18" font-weight="700">Mobile: Domain Board</text>
  <rect x="56" y="1480" width="808" height="54" fill="#e2e8f0" stroke="#cbd5e1"/>
  <text x="72" y="1512" font-family="Arial, sans-serif" font-size="12">Top Bar: view switcher + add button</text>
  <rect x="56" y="1548" width="808" height="120" fill="#fff" stroke="#cbd5e1"/>
  <text x="72" y="1576" font-family="Arial, sans-serif" font-size="12">Horizontal domain tabs: Klient | Trzby | Nad Ramec | B2B | ...</text>
  <rect x="56" y="1682" width="808" height="110" fill="#fff" stroke="#cbd5e1"/>
  <text x="72" y="1710" font-family="Arial, sans-serif" font-size="12">Card list stacked vertically</text>
  <rect x="56" y="1806" width="808" height="110" fill="#fff" stroke="#cbd5e1"/>
  <text x="72" y="1834" font-family="Arial, sans-serif" font-size="12">Bottom sheet for edit/create</text>

  <rect x="920" y="1430" width="840" height="730" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="936" y="1460" font-family="Arial, sans-serif" font-size="18" font-weight="700">States and Transitions</text>
  <text x="936" y="1490" font-family="Arial, sans-serif" font-size="12">1) Empty state: no initiatives in selected filter</text>
  <text x="936" y="1510" font-family="Arial, sans-serif" font-size="12">2) Loading state: skeleton cards and table rows</text>
  <text x="936" y="1530" font-family="Arial, sans-serif" font-size="12">3) Error state: failed API + retry action</text>
  <text x="936" y="1550" font-family="Arial, sans-serif" font-size="12">4) Viewer mode: inputs disabled, no delete actions</text>
  <text x="936" y="1570" font-family="Arial, sans-serif" font-size="12">5) Drag reorder: optimistic update with rollback on failure</text>
  <rect x="936" y="1600" width="792" height="220" fill="#fff" stroke="#cbd5e1"/>
  <text x="952" y="1630" font-family="Arial, sans-serif" font-size="12">Implementation Notes:</text>
  <text x="952" y="1650" font-family="Arial, sans-serif" font-size="12">- Keep one Railway service for API + built SPA</text>
  <text x="952" y="1670" font-family="Arial, sans-serif" font-size="12">- Session auth cookie from Express, no token storage in browser</text>
  <text x="952" y="1690" font-family="Arial, sans-serif" font-size="12">- Charts from Recharts for radar, heatmap-like matrix, scatter</text>
  <text x="952" y="1710" font-family="Arial, sans-serif" font-size="12">- Export via server CSV endpoint and client print-to-PDF mode</text>
  <text x="952" y="1730" font-family="Arial, sans-serif" font-size="12">- Initial data seeded from CIO markdown + spreadsheet capture</text>
</svg>
