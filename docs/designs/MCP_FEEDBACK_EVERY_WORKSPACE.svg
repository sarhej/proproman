<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="640" viewBox="0 0 920 640">
  <title>MCP feedback: regular MCP, every workspace</title>
  <desc>Architecture: agents use the same MCP connection as today; a dedicated tool submits feedback with source-tenant attribution; storage and triage live in the platform layer, not a separate MCP product.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
      .box-accent { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 8; }
      .box-store { fill: #ecfdf5; stroke: #047857; stroke-width: 1.5; rx: 8; }
      .title { font-family: system-ui, -apple-system, Segoe UI, sans-serif; font-size: 14px; font-weight: 700; fill: #0f172a; }
      .body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; font-size: 12px; fill: #475569; }
      .small { font-family: ui-monospace, monospace; font-size: 10px; fill: #64748b; }
      .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#m); }
      .label { font-family: system-ui, sans-serif; font-size: 11px; fill: #334155; }
    ]]></style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#64748b"/>
    </marker>
  </defs>

  <text x="460" y="36" text-anchor="middle" class="title" font-size="18">Product feedback via regular MCP (every workspace)</text>
  <text x="460" y="58" text-anchor="middle" class="body">One MCP connection per session; new tool(s) submit upstream; source workspace is implicit from OAuth / tenant context.</text>

  <!-- Row 1: left to right flow -->
  <rect class="box" x="40" y="100" width="140" height="100"/>
  <text x="110" y="132" text-anchor="middle" class="title">Coding agent</text>
  <text x="110" y="152" text-anchor="middle" class="body">Cursor / IDE</text>
  <text x="110" y="172" text-anchor="middle" class="small">invokes MCP tools</text>

  <rect class="box-accent" x="220" y="90" width="200" height="120"/>
  <text x="320" y="122" text-anchor="middle" class="title">Regular MCP</text>
  <text x="320" y="142" text-anchor="middle" class="body">Same server as today</text>
  <text x="320" y="162" text-anchor="middle" class="small">initiatives, domains, &#8230;</text>
  <text x="320" y="182" text-anchor="middle" class="small font-weight-bold" style="fill:#4338ca">+ report_feedback (new)</text>
  <text x="320" y="198" text-anchor="middle" class="small">tenantId from session</text>

  <rect class="box" x="460" y="100" width="160" height="100"/>
  <text x="540" y="132" text-anchor="middle" class="title">API layer</text>
  <text x="540" y="152" text-anchor="middle" class="body">Auth + tenant resolve</text>
  <text x="540" y="172" text-anchor="middle" class="small">validate role / rate limit</text>

  <rect class="box-store" x="660" y="85" width="220" height="130"/>
  <text x="770" y="118" text-anchor="middle" class="title">Feedback store</text>
  <text x="770" y="138" text-anchor="middle" class="body">Platform (public schema)</text>
  <text x="770" y="158" text-anchor="middle" class="small">tenantId, userId, kind,</text>
  <text x="770" y="174" text-anchor="middle" class="small">title, body, createdAt</text>
  <text x="770" y="194" text-anchor="middle" class="small">optional: link, severity</text>

  <path class="arrow" d="M 180 150 L 218 150"/>
  <text x="199" y="142" text-anchor="middle" class="label">MCP</text>

  <path class="arrow" d="M 420 150 L 458 150"/>
  <text x="439" y="142" text-anchor="middle" class="label">RPC</text>

  <path class="arrow" d="M 620 150 L 658 150"/>
  <text x="639" y="142" text-anchor="middle" class="label">INSERT</text>

  <!-- Row 2: contrast box -->
  <rect class="box" x="40" y="260" width="840" height="120"/>
  <text x="60" y="290" class="title">What we are not doing</text>
  <text x="60" y="312" class="body">&#8226; No second MCP URL or separate &#8220;feedback-only&#8221; MCP product for customers.</text>
  <text x="60" y="332" class="body">&#8226; No requirement to switch workspace in the app before the agent can report (switching is optional for humans).</text>
  <text x="60" y="352" class="body">&#8226; Footer-only text is not enough: the agent needs a real tool that returns ok + reference id.</text>

  <!-- Row 3: data flow detail -->
  <text x="40" y="420" class="title">Request shape (conceptual)</text>
  <rect class="box" x="40" y="432" width="400" height="100"/>
  <text x="56" y="458" class="small">tool: report_feedback</text>
  <text x="56" y="476" class="small">args: kind (bug | idea | other), title, details,</text>
  <text x="56" y="492" class="small">      optional context (e.g. initiative id, url)</text>
  <text x="56" y="510" class="small">server adds: reporterUserId, sourceTenantId, timestamps</text>

  <text x="480" y="420" class="title">Downstream (later)</text>
  <rect class="box" x="480" y="432" width="400" height="100"/>
  <text x="496" y="458" class="body">&#8226; Admin / Tymio hub UI: queue, filters by tenant</text>
  <text x="496" y="478" class="body">&#8226; Notifications (email, Slack) for SUPER_ADMIN</text>
  <text x="496" y="498" class="body">&#8226; Export or webhook to issue tracker (optional phase)</text>

  <!-- Row 4: sequence hint -->
  <text x="40" y="570" class="title">Sequence</text>
  <text x="40" y="592" class="body">1. User connects MCP in workspace A (same as today).</text>
  <text x="40" y="610" class="body">2. Agent calls report_feedback &#8594; row stored with sourceTenant = A.</text>
  <text x="40" y="628" class="body">3. Tymio operators triage in platform console or hub workspace UI.</text>
</svg>
