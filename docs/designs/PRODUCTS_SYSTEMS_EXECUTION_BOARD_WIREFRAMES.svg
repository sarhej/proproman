  <rect class="note" x="74" y="1390" width="772" height="182" />
  <text x="94" y="1418" class="label">Validation rules shown in settings</text>
  <text x="94" y="1442" class="small">1. Every column must map to exactly one PM status.</text>
  <text x="94" y="1462" class="small">2. One column must be the default landing column for new requirements entering the board.</text>
  <text x="94" y="1482" class="small">3. Multiple columns can map to the same PM status.</text>
  <text x="94" y="1502" class="small">4. PM statuses remain the existing requirement status field semantically, even though board columns are new.</text>
  <text x="94" y="1522" class="small">5. Warning state if provider columns change and mapping becomes stale.</text>
  <text x="94" y="1542" class="small">6. Optional future control: allow an internal board without any external integration.</text>

  <path class="connector" d="M 870 470 C 910 470, 930 470, 970 470" />
  <path class="connector" d="M 1460 1000 C 1260 1040, 1120 1110, 870 1180" />
  <path class="connector" d="M 560 810 C 560 835, 560 850, 560 910" />

  <rect class="note" x="1340" y="1018" width="390" height="130" />
  <text x="1360" y="1046" class="label">Implementation notes captured by wireframe</text>
  <text x="1360" y="1070" class="small">1. Board belongs to Product or System, not globally.</text>
  <text x="1360" y="1090" class="small">2. Cards still show feature context to preserve planning hierarchy.</text>
  <text x="1360" y="1110" class="small">3. PM status is visible but secondary to the column.</text>
  <text x="1360" y="1130" class="small">4. Settings screen is mandatory because mapping is first-class, not hidden config.</text>
</svg>
