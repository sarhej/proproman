  <text x="92" y="416" class="tiny">Visible on row: provider, health, aggregate PM statuses, and board entry actions.</text>

  <rect class="row" x="74" y="442" width="772" height="112" />
  <text x="92" y="470" class="label">Email Platform</text>
  <text x="92" y="490" class="small">System / configuration-heavy / support-led</text>
  <rect class="chip-warn" x="452" y="454" width="64" height="24" />
