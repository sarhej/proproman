  <rect class="note" x="74" y="572" width="772" height="210" />
  <text x="94" y="600" class="label">Explorer wireframe notes</text>
  <text x="94" y="624" class="small">1. Existing product rows become Product/System rows, not a separate screen for Systems.</text>
  <text x="94" y="644" class="small">2. Board state is visible before entering the board: provider, health, and PM status totals.</text>
  <text x="94" y="664" class="small">3. Empty state for "no board" is first-class. Do not force board creation before tree-based planning starts.</text>
  <text x="94" y="684" class="small">4. "Open board" is the new primary action. "Open tree" keeps the existing planning hierarchy accessible.</text>
  <text x="94" y="704" class="small">5. Progress metric should move toward PM status counts, not only the current isDone requirement count.</text>
  <text x="94" y="724" class="small">6. Future enhancement: if multiple boards exist, row shows default board plus a small "2 boards" link.</text>

