  <rect class="chip" x="530" y="454" width="74" height="24" />
  <text x="547" y="470" class="tiny">No board</text>
  <text x="530" y="497" class="tiny">No execution board configured yet.</text>
  <text x="530" y="515" class="tiny">Requirements can still exist in the tree.</text>
  <rect class="button-primary" x="712" y="454" width="114" height="28" />
