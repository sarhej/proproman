  <rect class="bg" x="0" y="0" width="1800" height="1660" />
  <text x="60" y="60" class="title">Products &amp; Systems / Execution Boards / Board Settings</text>
  <text x="60" y="88" class="text">Wireframes for replacing the global Requirements Kanban with Product/System-owned execution boards and column-to-status mapping.</text>

  <rect class="note" x="1340" y="32" width="400" height="90" />
  <text x="1360" y="58" class="label">Naming decision in scope</text>
  <text x="1360" y="80" class="small">Top-level planning objects are Products and Systems.</text>
  <text x="1360" y="98" class="small">Current "Product / Asset Explorer" label should become "Products &amp; Systems".</text>

  <rect class="page" x="50" y="130" width="820" height="680" />
  <text x="75" y="165" class="section">Panel A. Products &amp; Systems Explorer</text>
  <text x="75" y="188" class="small">Changed existing screen. Board entry point lives on the top-level row.</text>

  <rect class="input" x="74" y="210" width="160" height="34" />
  <text x="90" y="232" class="text">Status filter</text>
  <rect class="input" x="246" y="210" width="160" height="34" />
  <text x="262" y="232" class="text">Impact filter</text>
  <rect class="input" x="418" y="210" width="180" height="34" />
  <text x="434" y="232" class="text">Label mode</text>
  <rect class="input" x="610" y="210" width="220" height="34" />
  <text x="626" y="232" class="text">Quick search</text>

