<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="980" viewBox="0 0 1100 980">
  <title>Workspace selector: request new workspace</title>
  <desc>Wireframes for TenantSwitcher CTA, modal states, compact single-workspace row, and mobile drawer. Implementation: client TenantSwitcher + POST /api/tenant-requests; admin approval required.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 10; }
      .drop { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
      .btn { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.2; rx: 6; }
      .btn-primary { fill: #0284c7; stroke: #0369a1; stroke-width: 1.2; rx: 6; }
      .modal { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 10; }
      .title { font-family: system-ui, -apple-system, Segoe UI, sans-serif; font-size: 13px; font-weight: 700; fill: #0f172a; }
      .label { font-family: system-ui, sans-serif; font-size: 10px; font-weight: 600; fill: #64748b; text-transform: uppercase; }
      .body { font-family: system-ui, sans-serif; font-size: 11px; fill: #475569; }
      .small { font-family: system-ui, sans-serif; font-size: 9px; fill: #94a3b8; }
      .err { fill: #fef2f2; stroke: #f87171; stroke-width: 1; rx: 4; }
      .ok { fill: #ecfdf5; stroke: #34d399; stroke-width: 1; rx: 4; }
      .field { fill: #fff; stroke: #e2e8f0; stroke-width: 1; rx: 4; }
    ]]></style>
  </defs>

  <text x="550" y="28" text-anchor="middle" class="title" font-size="16">Workspace selector: Request new workspace (wireframes)</text>
  <text x="550" y="48" text-anchor="middle" class="body">CTA in dropdown footer (above help text) and on single-workspace compact row. Modal reuses register API; contact from session user read-only.</text>

  <!-- A: Multi-workspace dropdown -->
  <text x="40" y="78" class="title">A. Desktop: dropdown open (2+ workspaces)</text>
  <rect class="frame" x="40" y="88" width="320" height="280"/>
  <rect class="btn" x="56" y="104" width="200" height="28"/>
  <text x="68" y="122" class="body">Acme &#x25BE;</text>
  <rect class="drop" x="56" y="140" width="260" height="212"/>
  <text x="68" y="158" class="label">Workspaces</text>
  <text x="68" y="178" class="body">Demo (OWNER)</text>
  <text x="68" y="198" class="body" style="fill:#0369a1">Tymio (OWNER) selected</text>
  <line x1="68" y1="208" x2="300" y2="208" stroke="#e2e8f0" stroke-width="1"/>
  <rect class="btn-primary" x="68" y="218" width="220" height="26"/>
  <text x="178" y="235" text-anchor="middle" class="body" fill="#ffffff" font-size="10" font-weight="600">Request new workspace</text>
  <text x="68" y="258" class="small">Help: link icon copies /t/&#8230; sign-in URL</text>
  <text x="68" y="276" class="small">Applications section (if any) stays above CTA</text>

  <!-- B: Compact single workspace -->
  <text x="400" y="78" class="title">B. Single workspace: compact row (no chevron)</text>
  <rect class="frame" x="400" y="88" width="340" height="72"/>
  <text x="420" y="118" class="body" font-size="12">&#x25FB; Acme Corp</text>
  <rect class="btn" x="520" y="102" width="28" height="28"/>
  <text x="534" y="120" text-anchor="middle" class="small">link</text>
  <rect class="btn-primary" x="556" y="102" width="28" height="28"/>
  <text x="570" y="118" text-anchor="middle" class="small" fill="#fff" font-weight="700">+</text>
  <text x="592" y="120" class="small">Request (aria-label)</text>

  <!-- C: Modal default -->
  <text x="40" y="400" class="title">C. Modal: form (default)</text>
  <rect class="modal" x="40" y="412" width="300" height="260"/>
  <text x="56" y="436" class="title">Request new workspace</text>
  <text x="56" y="454" class="small">Admin approval required after submit.</text>
  <text x="56" y="476" class="label">Workspace name</text>
  <rect class="field" x="56" y="482" width="260" height="22"/>
  <text x="56" y="514" class="label">URL slug</text>
  <rect class="field" x="56" y="520" width="260" height="22"/>
  <text x="56" y="552" class="label">Contact (read-only)</text>
  <text x="56" y="568" class="body">Jane &lt;jane@acme.com&gt;</text>
  <text x="56" y="588" class="label">Message (optional)</text>
  <rect class="field" x="56" y="594" width="260" height="36"/>
  <rect class="btn" x="56" y="640" width="72" height="22"/>
  <text x="92" y="655" text-anchor="middle" class="body" font-size="10">Cancel</text>
  <rect class="btn-primary" x="220" y="640" width="96" height="22"/>
  <text x="268" y="655" text-anchor="middle" class="body" fill="#fff" font-size="10">Submit</text>

  <!-- D: Validation / errors -->
  <text x="380" y="400" class="title">D. Modal: validation &amp; errors</text>
  <rect class="modal" x="380" y="412" width="280" height="200"/>
  <text x="396" y="434" class="title">Inline validation</text>
  <text x="396" y="452" class="body">Empty name: no API call; show field error.</text>
  <text x="396" y="472" class="body">Invalid slug: same rules as public register.</text>
  <rect class="err" x="396" y="484" width="248" height="36"/>
  <text x="404" y="502" class="body" fill="#b91c1c" font-size="10">409: slug or request already exists</text>
  <text x="396" y="536" class="body">Generic error on network / 5xx.</text>
  <text x="396" y="556" class="body">Submitting: disable form + spinner on button.</text>

  <!-- E: Success -->
  <text x="700" y="400" class="title">E. Modal: success</text>
  <rect class="modal" x="700" y="412" width="280" height="160"/>
  <rect class="ok" x="716" y="428" width="40" height="40" rx="20"/>
  <text x="766" y="452" class="title">Request submitted</text>
  <text x="716" y="478" class="body">Same copy as register success; email param.</text>
  <text x="716" y="498" class="body">Close &#x2192; refetch applications list.</text>
  <rect class="btn" x="716" y="520" width="100" height="22"/>
  <text x="766" y="535" text-anchor="middle" class="body" font-size="10">Done</text>

  <!-- F: Mobile drawer -->
  <text x="40" y="720" class="title">F. Mobile: drawer + compact TenantSwitcher</text>
  <rect class="frame" x="40" y="732" width="260" height="220"/>
  <text x="56" y="756" class="body" font-weight="700">User menu</text>
  <rect class="frame" x="56" y="768" width="228" height="56"/>
  <text x="68" y="792" class="body">&#x25FB; Workspace + link + Request +</text>
  <text x="68" y="812" class="small">Same modal as desktop; z-index above drawer</text>
  <text x="56" y="848" class="body">Nav items below&#x8230;</text>

  <!-- Specs -->
  <text x="380" y="720" class="title">Implementation notes</text>
  <rect class="frame" x="380" y="732" width="700" height="220"/>
  <text x="396" y="756" class="body">&#8226; API: POST /api/tenant-requests (public); body: teamName, slug, contactName, contactEmail, optional message.</text>
  <text x="396" y="778" class="body">&#8226; After 201: force refetch GET /api/me/workspace-registration-requests; new row under Applications on next dropdown open.</text>
  <text x="396" y="800" class="body">&#8226; Shared slug helper: client/src/lib/workspaceRegistration.ts (keep in sync with RegisterTeamPage).</text>
  <text x="396" y="822" class="body">&#8226; i18n: tenant.requestNewWorkspace*, reuse register.errorSlugTaken, register.errorGeneric, register.success*.</text>
  <text x="396" y="844" class="body">&#8226; Tests: TenantSwitcher (CTA compact + dropdown, modal open/close, validation, 409, success refetch); optional slug unit tests.</text>
</svg>
